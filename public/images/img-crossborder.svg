<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060C18"/>
      <stop offset="55%" stop-color="#0A1422"/>
      <stop offset="100%" stop-color="#111D32"/>
    </linearGradient>
    <radialGradient id="glowKZ" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8C96A" stop-opacity="0.65"/>
      <stop offset="30%" stop-color="#C9A84C" stop-opacity="0.30"/>
      <stop offset="65%" stop-color="#C9A84C" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGE" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8C96A" stop-opacity="0.55"/>
      <stop offset="30%" stop-color="#C9A84C" stop-opacity="0.24"/>
      <stop offset="65%" stop-color="#C9A84C" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgVig" cx="50%" cy="50%" r="70%">
      <stop offset="25%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </radialGradient>
    <linearGradient id="routeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.6"/>
      <stop offset="25%" stop-color="#F0D878" stop-opacity="1"/>
      <stop offset="50%" stop-color="#FFEA8A" stop-opacity="1"/>
      <stop offset="75%" stop-color="#F0D878" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="blur5"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="blur12"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="blur25"><feGaussianBlur stdDeviation="25"/></filter>
    <filter id="blur45"><feGaussianBlur stdDeviation="45"/></filter>
    <pattern id="mapGrid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="80" y2="0" stroke="#1E3455" stroke-width="0.3" opacity="0.5"/>
      <line x1="0" y1="0" x2="0" y2="80" stroke="#1E3455" stroke-width="0.3" opacity="0.5"/>
    </pattern>
    <pattern id="fineDots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.6" fill="#C9A84C" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Base -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#mapGrid)"/>
  <rect width="1200" height="675" fill="url(#fineDots)"/>
  <rect width="1200" height="675" fill="url(#bgVig)"/>

  <!-- Curved latitude lines (map projection) -->
  <path d="M 0 120 Q 600 80 1200 120" fill="none" stroke="#2A4468" stroke-width="0.5" opacity="0.4"/>
  <path d="M 0 200 Q 600 165 1200 200" fill="none" stroke="#2A4468" stroke-width="0.5" opacity="0.45"/>
  <path d="M 0 280 Q 600 248 1200 280" fill="none" stroke="#2A4468" stroke-width="0.6" opacity="0.5"/>
  <path d="M 0 360 Q 600 330 1200 360" fill="none" stroke="#2A4468" stroke-width="0.6" opacity="0.55"/>
  <path d="M 0 440 Q 600 413 1200 440" fill="none" stroke="#2A4468" stroke-width="0.5" opacity="0.45"/>
  <path d="M 0 520 Q 600 495 1200 520" fill="none" stroke="#2A4468" stroke-width="0.4" opacity="0.35"/>
  <path d="M 0 600 Q 600 578 1200 600" fill="none" stroke="#2A4468" stroke-width="0.4" opacity="0.25"/>

  <!-- Longitude lines -->
  <path d="M 120 0 Q 125 340 120 675" fill="none" stroke="#2A4468" stroke-width="0.4" opacity="0.35"/>
  <path d="M 280 0 Q 287 340 280 675" fill="none" stroke="#2A4468" stroke-width="0.4" opacity="0.4"/>
  <path d="M 440 0 Q 448 340 440 675" fill="none" stroke="#2A4468" stroke-width="0.5" opacity="0.45"/>
  <path d="M 600 0 L 600 675" fill="none" stroke="#2A4468" stroke-width="0.5" opacity="0.5"/>
  <path d="M 760 0 Q 752 340 760 675" fill="none" stroke="#2A4468" stroke-width="0.5" opacity="0.45"/>
  <path d="M 920 0 Q 913 340 920 675" fill="none" stroke="#2A4468" stroke-width="0.4" opacity="0.4"/>
  <path d="M 1080 0 Q 1075 340 1080 675" fill="none" stroke="#2A4468" stroke-width="0.4" opacity="0.35"/>

  <!-- Topographic contour rings — KZ (left ~310,310) -->
  <ellipse cx="310" cy="310" rx="220" ry="145" fill="none" stroke="#C9A84C" stroke-width="0.35" opacity="0.10"/>
  <ellipse cx="310" cy="310" rx="175" ry="115" fill="none" stroke="#C9A84C" stroke-width="0.4" opacity="0.14"/>
  <ellipse cx="310" cy="310" rx="130" ry="86" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.20"/>
  <ellipse cx="310" cy="310" rx="88" ry="58" fill="none" stroke="#C9A84C" stroke-width="0.65" opacity="0.28"/>
  <ellipse cx="310" cy="310" rx="54" ry="36" fill="none" stroke="#C9A84C" stroke-width="0.85" opacity="0.38"/>

  <!-- Topographic contour rings — GE (right ~870,355) -->
  <ellipse cx="870" cy="355" rx="170" ry="112" fill="none" stroke="#C9A84C" stroke-width="0.35" opacity="0.10"/>
  <ellipse cx="870" cy="355" rx="132" ry="88" fill="none" stroke="#C9A84C" stroke-width="0.4" opacity="0.14"/>
  <ellipse cx="870" cy="355" rx="96" ry="64" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.20"/>
  <ellipse cx="870" cy="355" rx="64" ry="43" fill="none" stroke="#C9A84C" stroke-width="0.65" opacity="0.28"/>
  <ellipse cx="870" cy="355" rx="38" ry="26" fill="none" stroke="#C9A84C" stroke-width="0.85" opacity="0.38"/>

  <!-- KZ aura halo -->
  <ellipse cx="310" cy="310" rx="210" ry="210" fill="url(#glowKZ)" filter="url(#blur45)"/>
  <ellipse cx="310" cy="310" rx="120" ry="120" fill="url(#glowKZ)" filter="url(#blur25)"/>

  <!-- GE aura halo -->
  <ellipse cx="870" cy="355" rx="160" ry="160" fill="url(#glowGE)" filter="url(#blur45)"/>
  <ellipse cx="870" cy="355" rx="90" ry="90" fill="url(#glowGE)" filter="url(#blur25)"/>

  <!-- Route 1 — main arc (air corridor, upper sweep) — GLOW -->
  <path d="M 310 310 C 440 100, 740 120, 870 355" stroke="#C9A84C" stroke-width="20" fill="none" opacity="0.07" filter="url(#blur25)"/>
  <path d="M 310 310 C 440 100, 740 120, 870 355" stroke="#E8C96A" stroke-width="8" fill="none" opacity="0.12" filter="url(#blur12)"/>
  <!-- Route 1 — main visible line -->
  <path d="M 310 310 C 440 100, 740 120, 870 355" stroke="url(#routeGrad)" stroke-width="2" fill="none" opacity="0.95"/>

  <!-- Route 2 — road/ground route (lower curve) -->
  <path d="M 310 310 C 460 430, 720 460, 870 355" stroke="#C9A84C" stroke-width="1" fill="none" opacity="0.38" stroke-dasharray="5 11"/>

  <!-- Route 3 — middle corridor (rail) -->
  <path d="M 310 310 C 500 260, 700 272, 870 355" stroke="#C9A84C" stroke-width="0.7" fill="none" opacity="0.22" stroke-dasharray="2 13"/>

  <!-- Transit midpoint — route 1 apex marker -->
  <circle cx="590" cy="148" r="5.5" fill="#FFEA8A" opacity="0.92"/>
  <circle cx="590" cy="148" r="13" fill="none" stroke="#E8C96A" stroke-width="1.2" opacity="0.6"/>
  <circle cx="590" cy="148" r="24" fill="none" stroke="#C9A84C" stroke-width="0.6" opacity="0.32"/>
  <!-- Crosshair -->
  <line x1="590" y1="128" x2="590" y2="118" stroke="#E8C96A" stroke-width="1.2" opacity="0.65"/>
  <line x1="590" y1="168" x2="590" y2="178" stroke="#E8C96A" stroke-width="1.2" opacity="0.65"/>
  <line x1="570" y1="148" x2="560" y2="148" stroke="#E8C96A" stroke-width="1.2" opacity="0.65"/>
  <line x1="610" y1="148" x2="620" y2="148" stroke="#E8C96A" stroke-width="1.2" opacity="0.65"/>

  <!-- KZ node -->
  <circle cx="310" cy="310" r="58" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.2"/>
  <circle cx="310" cy="310" r="42" fill="none" stroke="#C9A84C" stroke-width="0.7" opacity="0.3"/>
  <circle cx="310" cy="310" r="28" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.45"/>
  <circle cx="310" cy="310" r="18" fill="none" stroke="#E8C96A" stroke-width="1.4" opacity="0.65"/>
  <circle cx="310" cy="310" r="12" fill="#C9A84C" opacity="0.2" filter="url(#blur5)"/>
  <circle cx="310" cy="310" r="8" fill="#0A1422" stroke="#C9A84C" stroke-width="2"/>
  <circle cx="310" cy="310" r="3.5" fill="#FFEA8A"/>
  <!-- KZ ticks -->
  <line x1="310" y1="280" x2="310" y2="268" stroke="#E8C96A" stroke-width="1.2" opacity="0.7"/>
  <line x1="310" y1="340" x2="310" y2="352" stroke="#E8C96A" stroke-width="1.2" opacity="0.7"/>
  <line x1="280" y1="310" x2="268" y2="310" stroke="#E8C96A" stroke-width="1.2" opacity="0.7"/>
  <line x1="340" y1="310" x2="352" y2="310" stroke="#E8C96A" stroke-width="1.2" opacity="0.7"/>
  <!-- KZ labels -->
  <text x="310" y="400" text-anchor="middle" fill="#E8C96A" font-family="Georgia, 'Times New Roman', serif" font-size="10" letter-spacing="5.5" opacity="0.9">KAZAKHSTAN</text>
  <line x1="248" y1="392" x2="372" y2="392" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <text x="310" y="416" text-anchor="middle" fill="#C9A84C" font-family="Georgia, serif" font-size="8" letter-spacing="2.5" opacity="0.55">51°N · 71°E</text>

  <!-- GE node -->
  <circle cx="870" cy="355" r="44" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.2"/>
  <circle cx="870" cy="355" r="32" fill="none" stroke="#C9A84C" stroke-width="0.7" opacity="0.3"/>
  <circle cx="870" cy="355" r="22" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.45"/>
  <circle cx="870" cy="355" r="14" fill="none" stroke="#E8C96A" stroke-width="1.4" opacity="0.65"/>
  <circle cx="870" cy="355" r="9" fill="#C9A84C" opacity="0.2" filter="url(#blur5)"/>
  <circle cx="870" cy="355" r="6" fill="#0A1422" stroke="#C9A84C" stroke-width="2"/>
  <circle cx="870" cy="355" r="2.5" fill="#FFEA8A"/>
  <!-- GE ticks -->
  <line x1="870" y1="330" x2="870" y2="318" stroke="#E8C96A" stroke-width="1.2" opacity="0.7"/>
  <line x1="870" y1="380" x2="870" y2="392" stroke="#E8C96A" stroke-width="1.2" opacity="0.7"/>
  <line x1="845" y1="355" x2="833" y2="355" stroke="#E8C96A" stroke-width="1.2" opacity="0.7"/>
  <line x1="895" y1="355" x2="907" y2="355" stroke="#E8C96A" stroke-width="1.2" opacity="0.7"/>
  <!-- GE labels -->
  <text x="870" y="436" text-anchor="middle" fill="#E8C96A" font-family="Georgia, 'Times New Roman', serif" font-size="10" letter-spacing="5.5" opacity="0.9">GEORGIA</text>
  <line x1="822" y1="428" x2="918" y2="428" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <text x="870" y="452" text-anchor="middle" fill="#C9A84C" font-family="Georgia, serif" font-size="8" letter-spacing="2.5" opacity="0.55">41°N · 44°E</text>

  <!-- Small satellite city nodes -->
  <circle cx="195" cy="475" r="3" fill="#C9A84C" opacity="0.45"/>
  <circle cx="195" cy="475" r="8" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.25"/>
  <line x1="195" y1="475" x2="310" y2="310" stroke="#C9A84C" stroke-width="0.4" opacity="0.15" stroke-dasharray="2 8"/>

  <circle cx="440" cy="490" r="2.5" fill="#C9A84C" opacity="0.35"/>
  <circle cx="440" cy="490" r="6" fill="none" stroke="#C9A84C" stroke-width="0.4" opacity="0.18"/>
  <line x1="440" y1="490" x2="310" y2="310" stroke="#C9A84C" stroke-width="0.3" opacity="0.12" stroke-dasharray="2 9"/>

  <circle cx="1000" cy="430" r="2.5" fill="#C9A84C" opacity="0.35"/>
  <circle cx="1000" cy="430" r="6" fill="none" stroke="#C9A84C" stroke-width="0.4" opacity="0.18"/>
  <line x1="1000" y1="430" x2="870" y2="355" stroke="#C9A84C" stroke-width="0.3" opacity="0.12" stroke-dasharray="2 9"/>

  <circle cx="780" cy="490" r="2" fill="#C9A84C" opacity="0.3"/>
  <line x1="780" y1="490" x2="870" y2="355" stroke="#C9A84C" stroke-width="0.3" opacity="0.1" stroke-dasharray="2 10"/>

  <!-- Scale bar at bottom -->
  <line x1="460" y1="610" x2="740" y2="610" stroke="#C9A84C" stroke-width="0.8" opacity="0.35"/>
  <line x1="460" y1="603" x2="460" y2="617" stroke="#C9A84C" stroke-width="0.8" opacity="0.35"/>
  <line x1="600" y1="604" x2="600" y2="616" stroke="#C9A84C" stroke-width="0.8" opacity="0.35"/>
  <line x1="740" y1="603" x2="740" y2="617" stroke="#C9A84C" stroke-width="0.8" opacity="0.35"/>
  <text x="600" y="636" text-anchor="middle" fill="#C9A84C" font-family="Georgia, serif" font-size="8" letter-spacing="3" opacity="0.45">DIRECT ROUTE · 3 100 KM</text>

  <!-- Corner brackets TL -->
  <line x1="35" y1="35" x2="100" y2="35" stroke="#C9A84C" stroke-width="1.4" opacity="0.4"/>
  <line x1="35" y1="35" x2="35" y2="100" stroke="#C9A84C" stroke-width="1.4" opacity="0.4"/>
  <circle cx="35" cy="35" r="3" fill="#C9A84C" opacity="0.6"/>
  <!-- Corner brackets TR -->
  <line x1="1165" y1="35" x2="1100" y2="35" stroke="#C9A84C" stroke-width="1.4" opacity="0.25"/>
  <line x1="1165" y1="35" x2="1165" y2="100" stroke="#C9A84C" stroke-width="1.4" opacity="0.25"/>
  <!-- Corner brackets BL -->
  <line x1="35" y1="640" x2="100" y2="640" stroke="#C9A84C" stroke-width="1.4" opacity="0.25"/>
  <line x1="35" y1="640" x2="35" y2="575" stroke="#C9A84C" stroke-width="1.4" opacity="0.25"/>
  <!-- Corner brackets BR -->
  <line x1="1165" y1="640" x2="1100" y2="640" stroke="#C9A84C" stroke-width="1.4" opacity="0.4"/>
  <line x1="1165" y1="640" x2="1165" y2="575" stroke="#C9A84C" stroke-width="1.4" opacity="0.4"/>
  <circle cx="1165" cy="640" r="3" fill="#C9A84C" opacity="0.6"/>
</svg>
