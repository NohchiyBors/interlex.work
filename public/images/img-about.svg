<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Backgrounds -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#060C18"/>
      <stop offset="45%" stop-color="#0C1828"/>
      <stop offset="100%" stop-color="#050A14"/>
    </linearGradient>
    <!-- Window light panels -->
    <linearGradient id="win1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8D5A0" stop-opacity="0.28"/>
      <stop offset="40%" stop-color="#C9A84C" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="win2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0E0B0" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#E8C96A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="win3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4BE88" stop-opacity="0.22"/>
      <stop offset="40%" stop-color="#C9A84C" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.03"/>
    </linearGradient>
    <!-- Floor -->
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A2840" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#060C18" stop-opacity="1"/>
    </linearGradient>
    <!-- Table top -->
    <linearGradient id="tableTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1C2E48"/>
      <stop offset="50%" stop-color="#0F1E32"/>
      <stop offset="100%" stop-color="#08121E"/>
    </linearGradient>
    <!-- Table highlight -->
    <linearGradient id="tableHL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
    <!-- Ceiling -->
    <linearGradient id="ceilingGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0E1A2C"/>
      <stop offset="100%" stop-color="#060C18"/>
    </linearGradient>
    <!-- Ambient right glow -->
    <radialGradient id="ambientGlow" cx="65%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <!-- Floor reflection glow -->
    <radialGradient id="floorGlow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur4"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="blur10"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="blur22"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="blur40"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="personBlur"><feGaussianBlur stdDeviation="1.5"/></filter>
    <pattern id="dots" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="0.7" fill="#C9A84C" opacity="0.07"/>
    </pattern>
    <mask id="fadeBottom">
      <linearGradient id="fadeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="60%" stop-color="white"/>
        <stop offset="100%" stop-color="black"/>
      </linearGradient>
      <rect width="1200" height="675" fill="url(#fadeGrad)"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#dots)"/>
  <rect width="1200" height="675" fill="url(#ambientGlow)"/>

  <!-- Ceiling plane -->
  <rect x="0" y="0" width="1200" height="120" fill="url(#ceilingGrad)"/>
  <!-- Ceiling line -->
  <line x1="0" y1="118" x2="1200" y2="118" stroke="#C9A84C" stroke-width="1.5" opacity="0.5"/>

  <!-- Ceiling recessed light tracks -->
  <rect x="150" y="40" width="900" height="3" rx="1.5" fill="#2A3E5A" opacity="0.6"/>
  <rect x="150" y="75" width="900" height="3" rx="1.5" fill="#2A3E5A" opacity="0.5"/>
  <!-- Light points in track -->
  <circle cx="250" cy="41" r="4" fill="#F0E0B0" opacity="0.9" filter="url(#blur4)"/>
  <circle cx="250" cy="41" r="2" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="450" cy="41" r="4" fill="#F0E0B0" opacity="0.9" filter="url(#blur4)"/>
  <circle cx="450" cy="41" r="2" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="650" cy="41" r="4" fill="#F0E0B0" opacity="0.9" filter="url(#blur4)"/>
  <circle cx="650" cy="41" r="2" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="850" cy="41" r="4" fill="#F0E0B0" opacity="0.9" filter="url(#blur4)"/>
  <circle cx="850" cy="41" r="2" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="1000" cy="41" r="4" fill="#F0E0B0" opacity="0.85" filter="url(#blur4)"/>
  <circle cx="1000" cy="41" r="2" fill="#FFFFFF" opacity="0.9"/>
  <!-- Light cone from track -->
  <polygon points="240,44 260,44 290,118 220,118" fill="#C9A84C" opacity="0.04"/>
  <polygon points="440,44 460,44 490,118 420,118" fill="#C9A84C" opacity="0.04"/>
  <polygon points="640,44 660,44 690,118 620,118" fill="#C9A84C" opacity="0.05"/>
  <polygon points="840,44 860,44 890,118 820,118" fill="#C9A84C" opacity="0.04"/>

  <!-- Horizon (floor line) -->
  <line x1="0" y1="490" x2="1200" y2="490" stroke="#C9A84C" stroke-width="1.5" opacity="0.45"/>

  <!-- Window wall — vertical frames -->
  <!-- Panel frame: left edge, right edge, fill -->
  <rect x="50" y="118" width="120" height="372" fill="url(#win3)"/>
  <line x1="50" y1="118" x2="50" y2="490" stroke="#C9A84C" stroke-width="1.2" opacity="0.35"/>
  <line x1="170" y1="118" x2="170" y2="490" stroke="#C9A84C" stroke-width="1.2" opacity="0.35"/>

  <rect x="190" y="118" width="145" height="372" fill="url(#win2)"/>
  <line x1="190" y1="118" x2="190" y2="490" stroke="#C9A84C" stroke-width="1.4" opacity="0.45"/>
  <line x1="335" y1="118" x2="335" y2="490" stroke="#C9A84C" stroke-width="1.4" opacity="0.45"/>

  <rect x="355" y="118" width="160" height="372" fill="url(#win1)"/>
  <line x1="355" y1="118" x2="355" y2="490" stroke="#C9A84C" stroke-width="1.6" opacity="0.55"/>
  <line x1="515" y1="118" x2="515" y2="490" stroke="#C9A84C" stroke-width="1.6" opacity="0.55"/>

  <rect x="535" y="118" width="145" height="372" fill="url(#win2)"/>
  <line x1="535" y1="118" x2="535" y2="490" stroke="#C9A84C" stroke-width="1.4" opacity="0.45"/>
  <line x1="680" y1="118" x2="680" y2="490" stroke="#C9A84C" stroke-width="1.4" opacity="0.45"/>

  <rect x="700" y="118" width="120" height="372" fill="url(#win3)"/>
  <line x1="700" y1="118" x2="700" y2="490" stroke="#C9A84C" stroke-width="1.2" opacity="0.35"/>
  <line x1="820" y1="118" x2="820" y2="490" stroke="#C9A84C" stroke-width="1.2" opacity="0.35"/>

  <rect x="840" y="118" width="100" height="372" fill="url(#win3)"/>
  <line x1="840" y1="118" x2="840" y2="490" stroke="#C9A84C" stroke-width="1" opacity="0.25"/>
  <line x1="940" y1="118" x2="940" y2="490" stroke="#C9A84C" stroke-width="1" opacity="0.25"/>

  <rect x="960" y="118" width="80" height="372" fill="url(#win3)"/>
  <line x1="960" y1="118" x2="960" y2="490" stroke="#C9A84C" stroke-width="0.8" opacity="0.2"/>
  <line x1="1040" y1="118" x2="1040" y2="490" stroke="#C9A84C" stroke-width="0.8" opacity="0.2"/>

  <!-- Window horizontal crossbars -->
  <line x1="50" y1="220" x2="1040" y2="220" stroke="#C9A84C" stroke-width="0.7" opacity="0.2"/>
  <line x1="50" y1="335" x2="1040" y2="335" stroke="#C9A84C" stroke-width="0.7" opacity="0.2"/>

  <!-- Exterior city glow beyond windows (blurred shapes suggesting distant lit buildings) -->
  <rect x="70" y="130" width="90" height="340" fill="#0A1830" opacity="0.7"/>
  <rect x="85" y="180" width="20" height="40" fill="#C9A84C" opacity="0.05" filter="url(#blur4)"/>
  <rect x="110" y="155" width="30" height="60" fill="#C9A84C" opacity="0.04" filter="url(#blur4)"/>

  <!-- Warm light on left wall (just left of window) -->
  <rect x="0" y="118" width="50" height="372" fill="#0D1828"/>
  <line x1="50" y1="118" x2="0" y2="260" stroke="#C9A84C" stroke-width="0.5" opacity="0.15"/>

  <!-- Right wall -->
  <rect x="1040" y="118" width="160" height="372" fill="#0A1424"/>
  <line x1="1040" y1="118" x2="1200" y2="200" stroke="#C9A84C" stroke-width="0.5" opacity="0.15"/>
  <line x1="1040" y1="490" x2="1200" y2="490" stroke="#C9A84C" stroke-width="0.5" opacity="0.2"/>

  <!-- Window ambient glow cast onto floor -->
  <ellipse cx="430" cy="490" rx="300" ry="60" fill="url(#floorGlow)" filter="url(#blur22)"/>

  <!-- Floor -->
  <rect x="0" y="490" width="1200" height="185" fill="url(#floorGrad)"/>

  <!-- Floor perspective lines from vanishing point -->
  <line x1="600" y1="675" x2="0" y2="490" stroke="#C9A84C" stroke-width="0.5" opacity="0.14"/>
  <line x1="600" y1="675" x2="200" y2="490" stroke="#C9A84C" stroke-width="0.5" opacity="0.14"/>
  <line x1="600" y1="675" x2="400" y2="490" stroke="#C9A84C" stroke-width="0.5" opacity="0.14"/>
  <line x1="600" y1="675" x2="600" y2="490" stroke="#C9A84C" stroke-width="0.5" opacity="0.14"/>
  <line x1="600" y1="675" x2="800" y2="490" stroke="#C9A84C" stroke-width="0.5" opacity="0.14"/>
  <line x1="600" y1="675" x2="1000" y2="490" stroke="#C9A84C" stroke-width="0.5" opacity="0.14"/>
  <line x1="600" y1="675" x2="1200" y2="490" stroke="#C9A84C" stroke-width="0.5" opacity="0.14"/>
  <!-- Floor horizontal lines (parquet rows) -->
  <line x1="0" y1="530" x2="1200" y2="530" stroke="#1E2E44" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="560" x2="1200" y2="560" stroke="#1E2E44" stroke-width="1" opacity="0.45"/>
  <line x1="0" y1="590" x2="1200" y2="590" stroke="#1E2E44" stroke-width="1" opacity="0.4"/>
  <line x1="0" y1="620" x2="1200" y2="620" stroke="#1E2E44" stroke-width="0.8" opacity="0.35"/>
  <line x1="0" y1="650" x2="1200" y2="650" stroke="#1E2E44" stroke-width="0.8" opacity="0.3"/>

  <!-- Floor reflection of windows -->
  <rect x="190" y="490" width="145" height="185" fill="#C9A84C" opacity="0.025"/>
  <rect x="355" y="490" width="160" height="185" fill="#C9A84C" opacity="0.04"/>
  <rect x="535" y="490" width="145" height="185" fill="#C9A84C" opacity="0.025"/>

  <!-- Conference table — proper perspective trapezoid -->
  <!-- Table top surface -->
  <polygon points="280,405 920,405 1020,490 180,490" fill="url(#tableTop)" stroke="#C9A84C" stroke-width="0.8" opacity="0.9"/>
  <!-- Table edge highlight -->
  <polygon points="280,405 920,405 928,412 272,412" fill="url(#tableHL)"/>
  <!-- Table near edge (thickness) -->
  <polygon points="180,490 1020,490 1020,500 180,500" fill="#060E1C" opacity="0.95"/>
  <!-- Table gold accent strip -->
  <line x1="280" y1="405" x2="920" y2="405" stroke="#C9A84C" stroke-width="1.5" opacity="0.7"/>
  <!-- Table surface reflection (window glow) -->
  <ellipse cx="600" cy="450" rx="300" ry="25" fill="#C9A84C" opacity="0.06" filter="url(#blur10)"/>
  <!-- Table legs (side view) -->
  <rect x="285" y="490" width="12" height="30" fill="#0A1520" opacity="0.8"/>
  <rect x="903" y="490" width="12" height="30" fill="#0A1520" opacity="0.8"/>

  <!-- People silhouettes — seated, abstract impressionist -->
  <!-- Person 1 -->
  <ellipse cx="380" cy="398" rx="18" ry="8" fill="#0A1422" opacity="0.85" filter="url(#personBlur)"/>
  <rect x="365" y="378" width="30" height="24" rx="12" fill="#0C1828" stroke="#C9A84C" stroke-width="0.5" opacity="0.55" filter="url(#personBlur)"/>
  <!-- Person 2 -->
  <ellipse cx="500" cy="396" rx="18" ry="8" fill="#0A1422" opacity="0.85" filter="url(#personBlur)"/>
  <rect x="485" y="374" width="30" height="26" rx="13" fill="#0C1828" stroke="#C9A84C" stroke-width="0.5" opacity="0.5" filter="url(#personBlur)"/>
  <!-- Person 3 (main/presenter, slightly larger) -->
  <ellipse cx="620" cy="395" rx="20" ry="9" fill="#0A1422" opacity="0.85" filter="url(#personBlur)"/>
  <rect x="604" y="370" width="32" height="28" rx="14" fill="#0C1828" stroke="#C9A84C" stroke-width="0.6" opacity="0.55" filter="url(#personBlur)"/>
  <!-- Person 4 -->
  <ellipse cx="740" cy="396" rx="18" ry="8" fill="#0A1422" opacity="0.8" filter="url(#personBlur)"/>
  <rect x="725" y="374" width="30" height="25" rx="12" fill="#0C1828" stroke="#C9A84C" stroke-width="0.5" opacity="0.5" filter="url(#personBlur)"/>
  <!-- Person 5 -->
  <ellipse cx="840" cy="398" rx="16" ry="7" fill="#0A1422" opacity="0.75" filter="url(#personBlur)"/>
  <rect x="826" y="378" width="28" height="23" rx="11" fill="#0C1828" stroke="#C9A84C" stroke-width="0.4" opacity="0.45" filter="url(#personBlur)"/>

  <!-- Laptop/device on table -->
  <rect x="575" y="402" width="50" height="3" rx="1" fill="#182840" opacity="0.8"/>
  <rect x="580" y="399" width="40" height="3" rx="1" fill="#1E3456" opacity="0.6"/>
  <!-- Screen glow -->
  <rect x="581" y="394" width="38" height="5" rx="1" fill="#3A6090" opacity="0.3" filter="url(#blur4)"/>

  <!-- Water glasses on table -->
  <rect x="420" y="400" width="6" height="5" rx="2" fill="#2A4870" opacity="0.5"/>
  <rect x="700" y="401" width="6" height="4" rx="2" fill="#2A4870" opacity="0.4"/>

  <!-- Ambient warm glow from bright window panels (cast on scene) -->
  <ellipse cx="435" cy="300" rx="160" ry="200" fill="#C9A84C" opacity="0.05" filter="url(#blur40)"/>
  <ellipse cx="610" cy="250" rx="140" ry="180" fill="#C9A84C" opacity="0.04" filter="url(#blur40)"/>

  <!-- Corner brackets TL -->
  <line x1="30" y1="30" x2="90" y2="30" stroke="#C9A84C" stroke-width="1.4" opacity="0.4"/>
  <line x1="30" y1="30" x2="30" y2="90" stroke="#C9A84C" stroke-width="1.4" opacity="0.4"/>
  <circle cx="30" cy="30" r="2.5" fill="#C9A84C" opacity="0.6"/>
  <!-- Corner brackets BR -->
  <line x1="1170" y1="645" x2="1110" y2="645" stroke="#C9A84C" stroke-width="1.4" opacity="0.4"/>
  <line x1="1170" y1="645" x2="1170" y2="585" stroke="#C9A84C" stroke-width="1.4" opacity="0.4"/>
  <circle cx="1170" cy="645" r="2.5" fill="#C9A84C" opacity="0.6"/>
</svg>
