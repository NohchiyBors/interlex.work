<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A1422"/>
      <stop offset="100%" stop-color="#162136"/>
    </linearGradient>
    <linearGradient id="windowLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#E8D5A0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="windowLight2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#E8D5A0" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1B2D4F" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0A1422" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="ambientRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1B2D4F" stop-opacity="0"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="softBlur"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="glowBlur"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="bigBlur"><feGaussianBlur stdDeviation="30"/></filter>
    <pattern id="dotGrid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="0.8" fill="#C9A84C" opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#dotGrid)"/>
  <rect width="1200" height="675" fill="url(#ambientRight)"/>

  <!-- Architectural window panels — ceiling to horizon -->
  <!-- Panel 1 (far left) -->
  <rect x="60" y="0" width="90" height="480" fill="url(#windowLight2)" rx="0"/>
  <line x1="60" y1="0" x2="60" y2="480" stroke="#C9A84C" stroke-width="0.8" opacity="0.25"/>
  <line x1="150" y1="0" x2="150" y2="480" stroke="#C9A84C" stroke-width="0.8" opacity="0.25"/>
  <!-- Panel 2 -->
  <rect x="170" y="0" width="110" height="480" fill="url(#windowLight)" rx="0"/>
  <line x1="170" y1="0" x2="170" y2="480" stroke="#C9A84C" stroke-width="0.8" opacity="0.3"/>
  <line x1="280" y1="0" x2="280" y2="480" stroke="#C9A84C" stroke-width="0.8" opacity="0.3"/>
  <!-- Panel 3 (bright) -->
  <rect x="300" y="0" width="130" height="480" fill="url(#windowLight)" rx="0" opacity="1.4"/>
  <line x1="300" y1="0" x2="300" y2="480" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
  <line x1="430" y1="0" x2="430" y2="480" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
  <!-- Panel 4 -->
  <rect x="450" y="0" width="120" height="480" fill="url(#windowLight2)" rx="0"/>
  <line x1="450" y1="0" x2="450" y2="480" stroke="#C9A84C" stroke-width="0.8" opacity="0.28"/>
  <line x1="570" y1="0" x2="570" y2="480" stroke="#C9A84C" stroke-width="0.8" opacity="0.28"/>
  <!-- Panel 5 -->
  <rect x="590" y="0" width="100" height="480" fill="url(#windowLight)" rx="0"/>
  <line x1="590" y1="0" x2="590" y2="480" stroke="#C9A84C" stroke-width="0.8" opacity="0.3"/>
  <line x1="690" y1="0" x2="690" y2="480" stroke="#C9A84C" stroke-width="0.8" opacity="0.3"/>
  <!-- Panel 6 -->
  <rect x="710" y="0" width="90" height="480" fill="url(#windowLight2)" rx="0"/>
  <line x1="710" y1="0" x2="710" y2="480" stroke="#C9A84C" stroke-width="0.7" opacity="0.22"/>
  <line x1="800" y1="0" x2="800" y2="480" stroke="#C9A84C" stroke-width="0.7" opacity="0.22"/>
  <!-- Panel 7 -->
  <rect x="820" y="0" width="80" height="480" fill="url(#windowLight2)" rx="0"/>
  <line x1="820" y1="0" x2="820" y2="480" stroke="#C9A84C" stroke-width="0.6" opacity="0.18"/>
  <line x1="900" y1="0" x2="900" y2="480" stroke="#C9A84C" stroke-width="0.6" opacity="0.18"/>
  <!-- Remaining panels right side -->
  <line x1="960" y1="0" x2="960" y2="480" stroke="#C9A84C" stroke-width="0.5" opacity="0.12"/>
  <line x1="1040" y1="0" x2="1040" y2="480" stroke="#C9A84C" stroke-width="0.4" opacity="0.1"/>
  <line x1="1110" y1="0" x2="1110" y2="480" stroke="#C9A84C" stroke-width="0.4" opacity="0.08"/>

  <!-- Horizontal frame lines (window crossbars) -->
  <line x1="0" y1="160" x2="1200" y2="160" stroke="#C9A84C" stroke-width="0.6" opacity="0.18"/>
  <line x1="0" y1="320" x2="1200" y2="320" stroke="#C9A84C" stroke-width="0.6" opacity="0.18"/>

  <!-- Ceiling line -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#C9A84C" stroke-width="1.5" opacity="0.4"/>

  <!-- Horizon / floor line -->
  <line x1="0" y1="480" x2="1200" y2="480" stroke="#C9A84C" stroke-width="1.5" opacity="0.5"/>
  <!-- Floor reflection -->
  <rect x="0" y="480" width="1200" height="195" fill="url(#floorGrad)"/>

  <!-- Floor reflection — window glow -->
  <rect x="170" y="480" width="110" height="195" fill="#C9A84C" opacity="0.03"/>
  <rect x="300" y="480" width="130" height="195" fill="#C9A84C" opacity="0.05"/>
  <rect x="450" y="480" width="120" height="195" fill="#C9A84C" opacity="0.03"/>

  <!-- Floor perspective lines -->
  <line x1="600" y1="675" x2="60" y2="480" stroke="#C9A84C" stroke-width="0.4" opacity="0.12"/>
  <line x1="600" y1="675" x2="280" y2="480" stroke="#C9A84C" stroke-width="0.4" opacity="0.12"/>
  <line x1="600" y1="675" x2="500" y2="480" stroke="#C9A84C" stroke-width="0.4" opacity="0.12"/>
  <line x1="600" y1="675" x2="700" y2="480" stroke="#C9A84C" stroke-width="0.4" opacity="0.12"/>
  <line x1="600" y1="675" x2="900" y2="480" stroke="#C9A84C" stroke-width="0.4" opacity="0.12"/>
  <line x1="600" y1="675" x2="1140" y2="480" stroke="#C9A84C" stroke-width="0.4" opacity="0.12"/>

  <!-- Silhouette — conference table (rectangle, centered) -->
  <rect x="340" y="380" width="520" height="80" rx="4" fill="#0D1826" stroke="#C9A84C" stroke-width="0.8" opacity="0.7"/>
  <!-- Table specular highlight -->
  <rect x="340" y="380" width="520" height="4" rx="2" fill="#C9A84C" opacity="0.15"/>

  <!-- Silhouette people — seated, abstract -->
  <ellipse cx="430" cy="374" rx="22" ry="12" fill="#0D1826" stroke="#C9A84C" stroke-width="0.5" opacity="0.6"/>
  <rect x="415" y="360" width="30" height="22" rx="15" fill="#0D1826" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/>
  <ellipse cx="540" cy="374" rx="22" ry="12" fill="#0D1826" stroke="#C9A84C" stroke-width="0.5" opacity="0.6"/>
  <rect x="525" y="358" width="30" height="24" rx="15" fill="#0D1826" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/>
  <ellipse cx="660" cy="374" rx="22" ry="12" fill="#0D1826" stroke="#C9A84C" stroke-width="0.5" opacity="0.6"/>
  <rect x="645" y="360" width="30" height="22" rx="15" fill="#0D1826" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/>
  <ellipse cx="770" cy="374" rx="22" ry="12" fill="#0D1826" stroke="#C9A84C" stroke-width="0.5" opacity="0.6"/>
  <rect x="755" y="360" width="30" height="22" rx="15" fill="#0D1826" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/>

  <!-- Ambient warm glow from windows -->
  <ellipse cx="365" cy="240" rx="120" ry="200" fill="#C9A84C" opacity="0.04" filter="url(#bigBlur)"/>
  <ellipse cx="600" cy="200" rx="100" ry="200" fill="#C9A84C" opacity="0.04" filter="url(#bigBlur)"/>

  <!-- Corner mark TL -->
  <line x1="30" y1="30" x2="80" y2="30" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="30" x2="30" y2="80" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
  <!-- Corner mark BR -->
  <line x1="1170" y1="645" x2="1120" y2="645" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
  <line x1="1170" y1="645" x2="1170" y2="595" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
</svg>
