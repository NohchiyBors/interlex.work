user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    gzip  on;

    # ─── Rate limiting ────────────────────────────────────────────────────────
    # 10mb зоны хватит на ~160 000 уникальных IP
    # rate=10r/m = не более 10 запросов в минуту с одного IP на /api/contact|brief
    limit_req_zone $binary_remote_addr zone=api_forms:10m rate=10r/m;

    # Зона для общего трафика (защита от DDoS)
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;

    server {
        listen       80;
        server_name  interlex.work www.interlex.work;

        # ─── Security headers ─────────────────────────────────────────────────
        add_header X-Frame-Options          "DENY"                          always;
        add_header X-Content-Type-Options   "nosniff"                       always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

        # ─── API: формы (строгий лимит) ───────────────────────────────────────
        location /api/contact {
            limit_req zone=api_forms burst=3 nodelay;
            limit_req_status 429;

            proxy_pass         http://web:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/brief {
            limit_req zone=api_forms burst=3 nodelay;
            limit_req_status 429;

            proxy_pass         http://web:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ─── Остальной трафик ─────────────────────────────────────────────────
        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass         http://web:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
